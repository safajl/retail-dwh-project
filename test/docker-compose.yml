services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: retail_dwh_test
    ports:
      - "3308:3306"
    volumes:
      - mysql_test_data:/var/lib/mysql
      - ../sql:/docker-entrypoint-initdb.d
    networks:
      - cluster_net
    restart: unless-stopped

networks:
  cluster_net:
    driver: bridge
    name: dwh_test_net

volumes:
  mysql_test_data: