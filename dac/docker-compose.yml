services:

  mysql_replica:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: retail_dwh_dac
    ports:
      - "3310:3306"
    volumes:
      - mysql_dac_data:/var/lib/mysql
      - ../sql:/docker-entrypoint-initdb.d
    networks:
      - cluster_net
    restart: unless-stopped
    command: >
      --server-id=2
      --log-bin=mysql-bin
      --binlog-format=ROW
      --relay-log=relay-bin
      --read-only=1

networks:
  cluster_net:
    driver: bridge
    name: dwh_dac_net

volumes:
  mysql_dac_data: