services:

  ndb_mgmd:
    image: mysql/mysql-cluster:8.0
    command: ndb_mgmd -f /etc/mysql-cluster.cnf --nodaemon
    volumes:
      - ../dev/config/mysql-cluster.cnf:/etc/mysql-cluster.cnf
      - mgmd_prod_data:/var/lib/mysql
    networks:
      - cluster_net
    ports:
      - "1187:1186"
    restart: unless-stopped

  ndbd1:
    image: mysql/mysql-cluster:8.0
    command: ndbd
    depends_on:
      - ndb_mgmd
    networks:
      - cluster_net
    volumes:
      - ndbd1_prod_data:/var/lib/mysql
    restart: unless-stopped

  ndbd2:
    image: mysql/mysql-cluster:8.0
    command: ndbd
    depends_on:
      - ndb_mgmd
    networks:
      - cluster_net
    volumes:
      - ndbd2_prod_data:/var/lib/mysql
    restart: unless-stopped

  mysqld:
    image: mysql/mysql-cluster:8.0
    command: mysqld
    depends_on:
      - ndbd1
      - ndbd2
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: retail_dwh
    networks:
      - cluster_net
    ports:
      - "3309:3306"
    volumes:
      - mysqld_prod_data:/var/lib/mysql
    restart: unless-stopped

networks:
  cluster_net:
    driver: bridge
    name: dwh_prod_net

volumes:
  mgmd_prod_data:
  ndbd1_prod_data:
  ndbd2_prod_data:
  mysqld_prod_data: